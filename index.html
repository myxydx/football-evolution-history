<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>足球进化史</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header>
      <div class="title">
        <h1>足球进化史</h1>
        <p>从剑桥规则、职业联赛、世界杯，到全攻全守、金元足球、VAR 与数据科学：用一棵可研发的时间树，看懂现代足球如何一步步长成今天的样子。</p>
      </div>
      <div class="view-toggle" aria-label="视图切换">
        <button class="active" data-view="research">研发模式</button>
        <button data-view="timeline">长时间轴</button>
        <button class="utility-button" id="resetProgress">重新开始</button>
      </div>
      <div class="zoom-controls" aria-label="缩放控制">
        <button id="zoomOut" title="缩小">−</button>
        <span id="zoomLabel">100%</span>
        <button id="zoomIn" title="放大">+</button>
        <button id="zoomReset" title="重置缩放">1:1</button>
      </div>
    </header>

    <aside class="panel">
      <h2>节点图鉴</h2>
      <input class="node-search" id="nodeSearch" type="search" placeholder="搜索节点，例如：支点中锋">
      <div class="node-results" id="nodeResults"></div>
      <h2>分支筛选</h2>
      <div class="filters" id="filters"></div>
      <div class="legend" id="legend"></div>
      <div class="legend">
        <h2>核对口径</h2>
        <span>硬事实：协会、赛事、规则、技术引入保留具体年份。</span>
        <span>趋势节点：战术/文化/商业趋势按代表时期处理。</span>
        <span>研发模式：只保留核心科技树，避免一次爆出过多分支。</span>
        <span>长时间轴：保留完整历史资料和先后顺序。</span>
        <span>实线：推动关系，会参与研发解锁。</span>
        <span>虚线：时间参考，只表示同分支先后，不参与解锁。</span>
        <span>关联解释是策展路径，不等同于唯一历史因果。</span>
      </div>
    </aside>

    <section class="panel map" id="map">
      <div class="mode-note" id="modeNote"></div>
      <div class="canvas-scale" id="canvasScale">
        <div class="tree-canvas" id="tree">
          <svg class="links" id="links" viewBox="0 0 1120 700"></svg>
        </div>
      </div>
      <div class="map-progress" id="mapProgress">
        <span id="progressStart">1848</span>
        <input id="mapScrubber" type="range" min="0" max="1000" value="0" aria-label="拖动时间轴位置">
        <span id="progressEnd">2026</span>
      </div>
    </section>

    <aside class="panel card" id="detail"></aside>

    <section class="panel timeline">
      <h2>历史节点</h2>
      <div class="timeline-track" id="timeline"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
